# Dependabot config for glance.
#
# - github-actions: workflows pin third-party actions (checkout,
#   setup-xcode, install-action, etc) by major version. Weekly update
#   PRs keep them honest without flooding the inbox.
# - swift: glance depends on swift-markdown + Highlightr, and on the
#   shared `sill` theming library (plan atelier) for its panel chrome +
#   Markdown role colours, pinned by url + SemVer in Package.swift with
#   the lockfile committed. Weekly PRs bump within range; grouped so a
#   multi-module sill release is one PR.
#
# Commit messages follow the gitmoji + Conventional Commits convention
# so commit-lint stays green on dependabot PRs.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      swift:
        patterns:
          - "*"
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"
    labels:
      - "dependencies"
      - "swift"
