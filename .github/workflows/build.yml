name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege, made explicit — closes zizmor's excessive-permissions
# finding ahead of the fleet-wide zizmor gate (akira-toriyama/.github t-qbp1).
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: ./build.sh

      - name: Test
        run: swift test

      - name: Sanity check binary
        run: file bin/glance && test -x bin/glance && ./bin/glance --version
