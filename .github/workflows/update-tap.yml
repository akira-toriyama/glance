name: update-tap

# Thin caller — delegates to the shared reusable at
# akira-toriyama/.github/.github/workflows/update-tap.yml. The bump logic
# (idempotent, repo-qualified first-match url+sha256 seds, stale-`revision`
# drop, no-downgrade guard, pull-rebase retry) and its docs live there; this
# file only declares the trigger and the formula name. Cross-repo write needs
# the repo secret HOMEBREW_TAP_TOKEN (a fine-grained PAT with Contents: Read &
# write on homebrew-tap).
#
# Replaces a custom bumper that predated the reusable. Everything it did is
# subsumed: its latest-fetch is the reusable's own fallback branch, and
# `glance-release-bot` was a cosmetic author string (auth is the PAT either
# way). Its `2+2` diff-shape assert is obsoleted by the reusable's seds being
# repo-qualified and first-match scoped, so collateral damage to the formula
# can't happen rather than merely being detected after the fact. What's gained:
# a 5-min timeout, pull-rebase retry (several repos write this tap, so a plain
# push does go non-fast-forward), and a guard against bumping the tap BACKWARD.
# See akira-toriyama/.github docs/release-tap-unification.md; task t-jd81.

on:
  release:
    # `[released]`, NOT the skeleton's `[published]` — a deliberate deviation,
    # kept from the custom bumper this replaces. `published` fires for PREreleases
    # too, which would land a prerelease in the stable tap; `released` excludes
    # them. glance's releases are published by hand in the GitHub UI, where "Set
    # as a pre-release" sits one tick away, so this is not theoretical. Nothing is
    # lost by keeping it: `released` does fire when a rolling draft is published
    # (verified — run 29552914210 bumped the tap to v0.3.0 on this very trigger).
    #
    # There is deliberately no `if: github.event.release.draft == false` guard.
    # It was dead: Actions does not deliver release events for drafts at all, and
    # on a workflow_dispatch `github.event.release.draft` is null, so the guard
    # evaluated `null == false` -> true and passed anyway.
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to bump (e.g. v0.4.0). Empty → latest published release."
        required: false
        default: ""

# Least privilege, made explicit. The reusable declares its own `contents: read`;
# this keeps the caller's token minimal too.
permissions:
  contents: read

jobs:
  bump:
    uses: akira-toriyama/.github/.github/workflows/update-tap.yml@v1.2.0
    with:
      formula: glance
      tag: ${{ github.event.inputs.tag || '' }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
