name: Release

# Thin caller of glyph's reusable rolling-DRAFT release (binary mode). A push
# to main makes `glyph release` compute the next version and the notes from
# each merged PR's individual (pre-squash) commits — gitmoji-driven and
# squash-safe — and create/update a single DRAFT release (no tag until you
# Publish in the UI). The verdict + draft logic and the binary that runs it
# ship together from akira-toriyama/glyph at ONE concrete tag (never a moving
# ref); this file supplies only glance's binary name + install prose. glance
# ships a bare `bin/glance` binary (built by ./build.sh), not an .app bundle,
# so it pins the reusable's `binary:` input — the first binary-mode caller.
# The git-cliff era config (cliff.toml) is gone — the classification table
# lives inside the glyph binary (`glyph rules`). The old inline workflow's
# published-release protections are subsumed: glyph writes drafts only, and
# the published floor guards the tag space.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: akira-toriyama/glyph/.github/workflows/release.yml@v0.10.2
    with:
      binary: glance
      dry-run: ${{ github.event.inputs.dry_run == 'true' }}
      install-notes: |
        ## Install

        **Homebrew:**

        ```sh
        brew install akira-toriyama/tap/glance
        ```

        **Prebuilt (`glance` below):** ad-hoc signed (not notarized).
        macOS quarantines downloads, so on first use:

        ```sh
        xattr -d com.apple.quarantine ./glance
        chmod +x ./glance
        ```
