name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        # scripts/build-icon.sh is zsh — shellcheck supports sh/bash/dash/ksh
        # only, so we skip it. zsh-specific syntax is fine there.
        run: |
          shellcheck --shell=sh \
            build.sh \
            install.sh \
            run.sh \
            stop.sh \
            scripts/hooks/commit-msg
