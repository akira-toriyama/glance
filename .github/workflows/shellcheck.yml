name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:

# Least privilege, made explicit — closes zizmor's excessive-permissions
# finding ahead of the fleet-wide zizmor gate (akira-toriyama/.github t-qbp1).
permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Lint-only, never pushes — drop the persisted checkout token. t-yaxa
          persist-credentials: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        # scripts/build-icon.sh is zsh — shellcheck supports sh/bash/dash/ksh
        # only, so we skip it. zsh-specific syntax is fine there.
        run: |
          shellcheck --shell=sh \
            build.sh \
            install.sh \
            run.sh \
            stop.sh
